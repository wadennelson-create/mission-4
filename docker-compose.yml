services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./front end
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
